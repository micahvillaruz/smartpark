spring.application.name=smartpark
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:smartparkdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL init
spring.sql.init.mode=always

# JWT
app.jwt.secret=${JWT_SECRET:ZmQ0ZGIyNzQxNTNhYWM4ODM5N2U1MjVmNDhkZWFmNGU3MzUwMWIzYTllMmQ0NzYwM2NjZGQzYjY3YTk0ZGY1MQ==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Static credentials (assignment allows this)
app.auth.username=${APP_AUTH_USERNAME:admin}
app.auth.password=${APP_AUTH_PASSWORD:admin123}

# Auto-checkout threshold (minutes)
app.parking.auto-checkout-minutes=15

# Scheduler frequency in milliseconds
app.parking.scheduler-rate-ms=30000

# Logging
logging.level.com.smartpark=INFO